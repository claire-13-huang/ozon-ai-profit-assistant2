<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利润计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .left-panel, .right-panel {
            flex: 1;
        }
        
        .price-highlight {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .price-left-block {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(238, 90, 36, 0.3);
        }

        .price-right-block {
            background: linear-gradient(135deg, #20c997 0%, #0d6efd 100%);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.25);
        }
        
        .price-highlight label {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .price-highlight input {
            font-size: 28px;
            font-weight: bold;
            border: 3px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.9);
        }

        .big-price {
            color: white;
            font-size: 42px;
            font-weight: bold;
            margin-top: 12px;
        }

        .top-summary-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .top-summary-item {
            background: rgba(255, 255, 255, 0.18);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .top-summary-item .label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .top-summary-item .value {
            color: white;
            font-size: 26px;
            font-weight: bold;
        }
        
        .cost-comparison {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .cost-item {
            flex: 1;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cost-item .label {
            font-size: 16px;
            color: #555;
            font-weight: 500;
        }
        
        .cost-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .cost-item.purchase {
            border-left-color: #007bff;
        }
        
        .cost-item.purchase .value {
            color: #007bff;
        }
        
        .cost-item.commission {
            border-left-color: #ffc107;
        }
        
        .cost-item.commission .value {
            color: #ffc107;
        }
        
        .cost-item.ad {
            border-left-color: #fd7e14;
        }
        
        .cost-item.ad .value {
            color: #fd7e14;
        }

        .cost-item.logistics {
            border-left-color: #28a745;
        }

        .cost-item.logistics .value {
            color: #28a745;
        }
        
        .summary-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            color: white;
            margin-bottom: 30px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-item .label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .summary-item .value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .subsidy-simple {
            background: #fff3cd;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #ffc107;
            margin-bottom: 30px;
        }
        
        .subsidy-simple label {
            color: #856404;
            font-weight: bold;
        }
        
        .subsidy-simple input {
            font-size: 20px;
            border-color: #ffc107;
        }
        
        .subsidy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.3s;
        }

        .calc-btn:hover {
            transform: translateY(-2px);
        }
        
        .panel-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .result-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .result-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .result-value.profit {
            color: #28a745;
        }
        
        .result-value.loss {
            color: #dc3545;
        }
        
        .subsidy-section {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #ffc107;
        }
        
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: #667eea;
            color: white;
        }
        
        .mode-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .export-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .price-highlight {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 利润计算器</h1>
        
        <div class="main-content">
            <!-- 预设售价突出显示 -->
            <div class="price-highlight">
                <div class="price-left-block">
                    <label>💰 预设售价 (元)</label>
                    <input type="number" id="salePrice" placeholder="请输入商品计划销售价" step="0.01">
                    <div class="top-summary-grid">
                        <div class="top-summary-item">
                            <div class="label">总成本</div>
                            <div class="value" id="totalCost">¥0.00</div>
                        </div>
                        <div class="top-summary-item">
                            <div class="label">利润</div>
                            <div class="value" id="profit">¥0.00</div>
                        </div>
                        <div class="top-summary-item">
                            <div class="label">利润率</div>
                            <div class="value" id="profitRate">0.00%</div>
                        </div>
                    </div>
                </div>

                <div class="price-right-block">
                    <label>💸 补贴金额</label>
                    <div class="big-price" id="subsidyAmountDisplay">¥0.00</div>
                    <div class="top-summary-grid">
                        <div class="top-summary-item">
                            <div class="label">补贴率</div>
                            <div class="value" id="subsidyRateDisplay">0.00%</div>
                        </div>
                        <div class="top-summary-item">
                            <div class="label">补贴后售价 (元)</div>
                            <input type="number" id="subsidySalePrice" placeholder="请输入补贴后售价" step="0.01">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 费用对照区域 -->
            <div class="cost-comparison">
                <div class="cost-item logistics">
                    <div class="label">📦 物流渠道</div>
                    <input type="text" id="logistics" placeholder="自定义物流渠道" style="width: 150px; font-size: 16px; padding: 8px;">
                </div>
                <div class="cost-item logistics">
                    <div class="label">物流费用</div>
                    <div class="value" id="logisticsCost">¥0.00</div>
                </div>
            </div>
            
            <div class="cost-comparison">
                <div class="cost-item purchase">
                    <div class="label">🛒 采购成本</div>
                    <input type="number" id="purchaseCost" placeholder="采购价" step="0.01" style="width: 150px; font-size: 16px; padding: 8px;">
                </div>
                <div class="cost-item purchase">
                    <div class="label">采购费用</div>
                    <div class="value" id="purchaseCostDisplay">¥0.00</div>
                </div>
            </div>
            
            <div class="cost-comparison">
                <div class="cost-item commission">
                    <div class="label">📊 佣金费率 (%)</div>
                    <input type="number" id="commissionRate" placeholder="例如: 5" step="0.1" style="width: 150px; font-size: 16px; padding: 8px;">
                </div>
                <div class="cost-item commission">
                    <div class="label">佣金费用</div>
                    <div class="value" id="commissionCost">¥0.00</div>
                </div>
            </div>
            
            <div class="cost-comparison">
                <div class="cost-item ad">
                    <div class="label">📢 广告费率 (%)</div>
                    <input type="number" id="adRate" placeholder="例如: 3" step="0.1" style="width: 150px; font-size: 16px; padding: 8px;">
                </div>
                <div class="cost-item ad">
                    <div class="label">广告费用</div>
                    <div class="value" id="adCost">¥0.00</div>
                </div>
            </div>
            
            <!-- 其他输入项 -->
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px;">
                <div class="form-group">
                    <label>仓库</label>
                    <select id="warehouse">
                        <option value="国内仓">国内仓</option>
                        <option value="海外仓">海外仓</option>
                        <option value="保税仓">保税仓</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>毛重 (g)</label>
                    <input type="number" id="weight" placeholder="商品+包装重量" step="0.1">
                </div>
                
                <div class="form-group">
                    <label>物流单价 (元/g)</label>
                    <input type="number" id="unitPrice" placeholder="物流单价" step="0.001">
                </div>
                
                <div class="form-group">
                    <label>操作费用 (元)</label>
                    <input type="number" id="operationFee" placeholder="单件固定操作费" step="0.01">
                </div>
                
                <div class="form-group">
                    <label>退货费率 (%)</label>
                    <input type="number" id="returnRate" placeholder="例如: 2" step="0.1">
                </div>
                
                <div class="form-group">
                    <label>其他费率 (%)</label>
                    <input type="number" id="otherRate" placeholder="例如: 1" step="0.1">
                </div>
            </div>
            
            <button class="export-btn" onclick="exportToCSV()">📥 导出为CSV</button>
        </div>
    </div>
    
    <script>
        // 获取输入值，如果为空则返回0
        function getValue(id) {
            const value = parseFloat(document.getElementById(id).value);
            return isNaN(value) ? 0 : value;
        }
        
        // 计算所有费用和利润
        function calculate() {
            // 获取输入值
            const weight = getValue('weight');           // 毛重_g
            const unitPrice = getValue('unitPrice');     // 单价_per_g
            const operationFee = getValue('operationFee'); // 操作费用
            const purchaseCost = getValue('purchaseCost'); // 采购成本
            const salePrice = getValue('salePrice');     // 预设售价
            const commissionRate = getValue('commissionRate') / 100; // 佣金费率
            const adRate = getValue('adRate') / 100;     // 广告费率
            const returnRate = getValue('returnRate') / 100; // 退货费率
            const otherRate = getValue('otherRate') / 100; // 其他费率
            
            // 计算各项费用
            const logisticsCost = weight * unitPrice + operationFee; // 物流费用
            const commissionCost = salePrice * commissionRate;       // 佣金费用
            const adCost = salePrice * adRate;                       // 广告费用
            const returnCost = salePrice * returnRate;              // 退货损失
            const otherCost = salePrice * otherRate;                // 其他成本
            
            // 计算总成本
            const totalCost = logisticsCost + purchaseCost + commissionCost + adCost + returnCost + otherCost;
            
            // 计算利润
            const profit = salePrice - totalCost;
            
            // 计算利润率
            const profitRate = salePrice > 0 ? (profit / salePrice) * 100 : 0;
            
            // 根据补贴后售价自动计算补贴金额和补贴率
            const subsidySalePrice = getValue('subsidySalePrice');
            const subsidyAmount = salePrice > 0 && subsidySalePrice > 0 ? salePrice - subsidySalePrice : 0;
            const subsidyRate = salePrice > 0 ? (subsidyAmount / salePrice) * 100 : 0;
            
            // 更新显示结果
            document.getElementById('logisticsCost').textContent = '¥' + logisticsCost.toFixed(2);
            document.getElementById('purchaseCostDisplay').textContent = '¥' + purchaseCost.toFixed(2);
            document.getElementById('commissionCost').textContent = '¥' + commissionCost.toFixed(2);
            document.getElementById('adCost').textContent = '¥' + adCost.toFixed(2);
            document.getElementById('totalCost').textContent = '¥' + totalCost.toFixed(2);
            document.getElementById('profit').textContent = '¥' + profit.toFixed(2);
            document.getElementById('profitRate').textContent = profitRate.toFixed(2) + '%';
            document.getElementById('subsidyAmountDisplay').textContent = '¥' + subsidyAmount.toFixed(2);
            document.getElementById('subsidyRateDisplay').textContent = subsidyRate.toFixed(2) + '%';
            
            // 根据利润正负设置颜色
            const profitElement = document.getElementById('profit');
            if (profit >= 0) {
                profitElement.classList.remove('loss');
                profitElement.classList.add('profit');
            } else {
                profitElement.classList.remove('profit');
                profitElement.classList.add('loss');
            }
        }
        
        // 导出为CSV
        function exportToCSV() {
            // 获取所有数据
            const data = {
                '仓库': document.getElementById('warehouse').value,
                '物流渠道': document.getElementById('logistics').value,
                '毛重_g': getValue('weight'),
                '单价_per_g': getValue('unitPrice'),
                '操作费用': getValue('operationFee'),
                '采购成本': getValue('purchaseCost'),
                '预设售价': getValue('salePrice'),
                '佣金费率': getValue('commissionRate'),
                '广告费率': getValue('adRate'),
                '退货费率': getValue('returnRate'),
                '其他费率': getValue('otherRate'),
                '物流费用': document.getElementById('logisticsCost').textContent,
                '佣金费用': document.getElementById('commissionCost').textContent,
                '广告费用': document.getElementById('adCost').textContent,
                '总成本': document.getElementById('totalCost').textContent,
                '利润': document.getElementById('profit').textContent,
                '利润率': document.getElementById('profitRate').textContent,
                '补贴金额': document.getElementById('subsidyAmountDisplay').textContent,
                '补贴率': document.getElementById('subsidyRateDisplay').textContent,
                '补贴后售价': getValue('subsidySalePrice')
            };
            
            // 创建CSV内容
            let csvContent = 'data:text/csv;charset=utf-8,\uFEFF'; // 添加BOM以支持中文
            csvContent += Object.keys(data).join(',') + '\n';
            csvContent += Object.values(data).join(',') + '\n';
            
            // 创建下载链接
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement('a');
            link.setAttribute('href', encodedUri);
            link.setAttribute('download', '利润计算表_' + new Date().toLocaleDateString() + '.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // 为所有输入框添加事件监听，输入时自动计算
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('input', calculate);
            input.addEventListener('change', calculate);
        });
        
        // 页面加载时执行一次计算
        calculate();
    </script>
</body>
</html>
